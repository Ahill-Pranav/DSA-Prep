services:
  # Backend Web Service
  - type: web
    name: dsa-tracker-pro-api
    env: python
    buildCommand: "pip install -r server/requirements.txt"
    startCommand: "cd server && python main.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dsa-tracker-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false # Set manually in Dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 8000

databases:
  - name: dsa-tracker-db
    plan: free # Change to starter/standard for production
    databaseName: dsa_tracker
    user: dsa_admin
